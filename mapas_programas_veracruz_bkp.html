<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #EEF2F7; min-height: 100vh; font-size: 14px; }

header {
  background: linear-gradient(135deg, #1B2A4A 0%, #2E4A7A 100%);
  color: white; padding: 16px 24px; text-align: center;
}
header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
header p { font-size: 12px; opacity: 0.7; margin-top: 3px; }

.tabs-wrap { background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.09); position: sticky; top: 0; z-index: 100; }
.tabs { display: flex; overflow-x: auto; padding: 0 12px; gap: 2px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 16px; border: none; background: none;
  font-size: 11px; font-weight: 600; color: #718096; cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -1px;
  white-space: nowrap; transition: 0.18s; display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.tab-btn .tshort { font-size: 13px; font-weight: 800; }
.tab-btn.active { color: var(--c); border-bottom-color: var(--c); }
.tab-btn:hover:not(.active) { color: var(--c); background: #F7FAFC; }

.content { padding: 16px; max-width: 960px; margin: 0 auto; }
.prog-sec { display: none; }
.prog-sec.active { display: block; }

.map-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; }
.card-header {
  background: var(--c); color: white;
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-header h2 { font-size: 15px; font-weight: 700; }
.badge { background: rgba(255,255,255,0.22); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }

.map-area {
  position: relative; width: 100%; height: 480px;
  background: linear-gradient(145deg, #f8fafc 0%, #edf2f7 100%); overflow: hidden;
}
.map-svg { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

.node {
  position: absolute; border-radius: 10px; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  text-align: center; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 8px 10px;
  border: 2px solid transparent; user-select: none;
}
.node:hover { transform: scale(1.07) translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.22) !important; z-index: 20; }
.node.sel { transform: scale(1.07) translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.22) !important; z-index: 20; border-color: rgba(255,255,255,0.6); }
.node.central { border-radius: 50%; }
.ni { font-size: 18px; margin-bottom: 3px; }
.nt { font-size: 10.5px; font-weight: 700; line-height: 1.25; color: white; }
.ns { font-size: 9px; opacity: 0.82; margin-top: 2px; line-height: 1.25; color: white; }

.det-panel {
  padding: 14px 20px; min-height: 88px; border-top: 1px solid #E2E8F0;
  background: white; display: flex; align-items: flex-start; gap: 14px;
}
.det-icon { font-size: 26px; flex-shrink: 0; margin-top: 1px; }
.det-body h4 { font-size: 13px; font-weight: 700; color: var(--c); margin-bottom: 4px; }
.det-body p { font-size: 12px; color: #4A5568; line-height: 1.65; }
.hint { font-size: 10.5px; color: #A0AEC0; text-align: center; padding: 7px 20px 10px; border-top: 1px solid #EDF2F7; }
</style>
</head>

function hexRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const tabs = document.getElementById('tabs');
const main = document.getElementById('main');

P.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.style.setProperty('--c', p.color);
  btn.innerHTML = `<span class="tshort">${p.icon} ${p.short.replace('\n',' ')}</span><span>${p.type}</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.prog-sec').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('s-'+p.id).classList.add('active');
  };
  tabs.appendChild(btn);

  const sec = document.createElement('div');
  sec.className = 'prog-sec'+(i===0?' active':'');
  sec.id = 's-'+p.id;
  sec.style.setProperty('--c', p.color);

  const cNode = p.nodes.find(n=>n.id==='c');
  sec.innerHTML = `
    <div class="map-card">
      <div class="card-header">
        <h2>${p.icon} ${p.name}</h2>
        <span class="badge">${p.type}</span>
      </div>
      <div class="map-area" id="a-${p.id}">
        <svg class="map-svg" id="svg-${p.id}" viewBox="0 0 900 480" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="det-panel" id="d-${p.id}">
        <span class="det-icon">${p.icon}</span>
        <div class="det-body">
          <h4>${p.name}</h4>
          <p>${cNode.det}</p>
        </div>
      </div>
      <div class="hint">💡 Haz clic en cualquier nodo para ver su descripción detallada</div>
    </div>`;
  main.appendChild(sec);

  const svg = document.getElementById('svg-'+p.id);
  const area = document.getElementById('a-'+p.id);
  const det = document.getElementById('d-'+p.id);

  p.conns.forEach(([a,b]) => {
    const na=p.nodes.find(n=>n.id===a), nb=p.nodes.find(n=>n.id===b);
    const el=document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',na.x); el.setAttribute('y1',na.y);
    el.setAttribute('x2',nb.x); el.setAttribute('y2',nb.y);
    el.setAttribute('stroke', p.color);
    el.setAttribute('stroke-width','2.5');
    el.setAttribute('stroke-opacity','0.32');
    svg.appendChild(el);
  });

  p.nodes.forEach(n => {
    const isCx = n.cx;
    const w = isCx ? 128 : 136;
    const lp = (n.x/900*100), tp = (n.y/480*100);
    const div = document.createElement('div');
    div.className = 'node'+(isCx?' central':'');
    div.style.cssText = `left:calc(${lp}% - ${w/2}px);top:calc(${tp}% - ${isCx?64:38}px);width:${w}px;${isCx?`height:${w}px;`:''}background:${isCx?p.color:hexRgba(p.color,0.82)};box-shadow:0 4px 14px ${hexRgba(p.color,0.28)};`;
    div.innerHTML = `<span class="ni">${n.icon}</span><span class="nt">${n.lbl.replace(/\n/g,'<br>')}</span>${n.sub?`<span class="ns">${n.sub}</span>`:''}`;
    div.onclick = () => {
      document.querySelectorAll(`#a-${p.id} .node`).forEach(el=>el.classList.remove('sel'));
      div.classList.add('sel');
      det.innerHTML = `<span class="det-icon">${n.icon}</span><div class="det-body"><h4>${n.lbl.replace(/\n/g,' ')}</h4><p>${n.det.replace(/\n/g,'<br>')}</p></div>`;
    };
    area.appendChild(div);
  });
});
</script>
</body>
</html>
