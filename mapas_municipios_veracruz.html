<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapas Económicos — Tres Municipios de Veracruz</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EEF2F7;font-size:14px;}
header{background:linear-gradient(135deg,#1B2A4A 0%,#2E4A7A 100%);color:white;padding:16px 24px;text-align:center;}
header h1{font-size:17px;font-weight:700;}
header p{font-size:12px;opacity:.7;margin-top:3px;}
.tabs-wrap{background:white;box-shadow:0 2px 6px rgba(0,0,0,.09);position:sticky;top:0;z-index:100;}
.tabs{display:flex;overflow-x:auto;padding:0 12px;gap:2px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 16px;border:none;background:none;font-size:11px;font-weight:600;color:#718096;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:1px;}
.tab-btn .ts{font-size:13px;font-weight:800;}
.tab-btn .tt{font-size:10px;color:#A0AEC0;}
.tab-btn.active{color:var(--c);border-bottom-color:var(--c);}
.tab-btn:hover:not(.active){color:var(--c);background:#F7FAFC;}
.content{padding:16px;max-width:960px;margin:0 auto;}
.sec{display:none;}
.sec.active{display:block;}
.map-card{background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.09);overflow:hidden;}
.card-hdr{background:var(--c);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.card-hdr h2{font-size:14px;font-weight:700;}
.badge{background:rgba(255,255,255,.22);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.map-area{position:relative;width:100%;height:480px;background:linear-gradient(145deg,#f8fafc 0%,#edf2f7 100%);overflow:hidden;}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.node{position:absolute;border-radius:10px;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 10px;border:2px solid transparent;user-select:none;}
.node:hover,.node.sel{transform:scale(1.07) translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.22)!important;z-index:20;}
.node.sel{border-color:rgba(255,255,255,.6);}
.node.central{border-radius:50%;}
.ni{font-size:18px;margin-bottom:3px;}
.nt{font-size:10.5px;font-weight:700;line-height:1.25;color:white;}
.ns{font-size:9px;opacity:.82;margin-top:2px;line-height:1.25;color:white;}
.det-panel{padding:14px 20px;min-height:88px;border-top:1px solid #E2E8F0;background:white;display:flex;align-items:flex-start;gap:14px;}
.det-icon{font-size:26px;flex-shrink:0;margin-top:1px;}
.det-body h4{font-size:13px;font-weight:700;color:var(--c);margin-bottom:4px;}
.det-body p{font-size:12px;color:#4A5568;line-height:1.65;}
.hint{font-size:10.5px;color:#A0AEC0;text-align:center;padding:7px 20px 10px;border-top:1px solid #EDF2F7;}
.comp-sec{display:flex;flex-direction:column;gap:16px;}
.comp-block{background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.09);overflow:hidden;}
.comp-hdr{background:linear-gradient(135deg,#1B2A4A 0%,#2E4A7A 100%);color:white;padding:12px 20px;}
.comp-hdr h2{font-size:14px;font-weight:700;}
.comp-hdr p{font-size:11px;opacity:.75;margin-top:3px;}
.radar-wrap{padding:20px;display:flex;justify-content:center;}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;}
.muni-card{border-radius:10px;overflow:hidden;border:1px solid #E2E8F0;}
.mc-head{padding:10px 14px;color:white;display:flex;align-items:center;gap:10px;}
.mc-ico{font-size:22px;}
.mc-head h3{font-size:13px;font-weight:700;margin-bottom:1px;}
.mc-tipo{font-size:10px;opacity:.85;}
.mc-body{padding:10px 14px;}
.mc-row{display:flex;flex-direction:column;padding:5px 0;border-bottom:.5px solid #EDF2F7;}
.mc-row:last-child{border-bottom:none;}
.mc-lbl{font-size:9.5px;color:#A0AEC0;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.mc-val{font-size:11.5px;color:#2D3748;line-height:1.4;}
.mc-row.hl .mc-val{font-weight:700;color:var(--c);}
.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
.conv-item{background:#F8FAFC;border-radius:8px;padding:12px 14px;border-left:4px solid var(--lc);}
.conv-item h4{font-size:12px;font-weight:700;color:var(--lc);margin-bottom:5px;}
.conv-item p{font-size:11.5px;color:#4A5568;line-height:1.6;}
@media(max-width:700px){.cards-grid{grid-template-columns:1fr;}.conv-grid{grid-template-columns:1fr;}}
</style>
</head>

function hexRgba(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const tabsEl=document.getElementById('tabs');
const mainEl=document.getElementById('main');

M.forEach((m,i)=>{
  const btn=document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.style.setProperty('--c',m.color);
  btn.innerHTML=`<span class="ts">${m.icon} ${m.name}</span><span class="tt">${m.sub}</span>`;
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('s-'+m.id).classList.add('active');
  };
  tabsEl.appendChild(btn);

  const sec=document.createElement('div');
  sec.className='sec'+(i===0?' active':'');
  sec.id='s-'+m.id;
  sec.style.setProperty('--c',m.color);
  const cN=m.nodes.find(n=>n.id==='c');
  sec.innerHTML=`
    <div class="map-card">
      <div class="card-hdr">
        <h2>${m.icon} ${m.name} — Panorama Económico y Marco Estratégico</h2>
        <span class="badge">${m.sub}</span>
      </div>
      <div class="map-area" id="a-${m.id}">
        <svg class="map-svg" id="svg-${m.id}" viewBox="0 0 900 480" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="det-panel" id="d-${m.id}">
        <span class="det-icon">${m.icon}</span>
        <div class="det-body"><h4>${m.name} — Vista General</h4><p>${cN.det}</p></div>
      </div>
      <div class="hint">💡 Haz clic en cada nodo para explorar sus detalles</div>
    </div>`;
  mainEl.appendChild(sec);

  const svg=document.getElementById('svg-'+m.id);
  const area=document.getElementById('a-'+m.id);
  const det=document.getElementById('d-'+m.id);

  m.conns.forEach(([a,b])=>{
    const na=m.nodes.find(n=>n.id===a),nb=m.nodes.find(n=>n.id===b);
    const el=document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',na.x);el.setAttribute('y1',na.y);
    el.setAttribute('x2',nb.x);el.setAttribute('y2',nb.y);
    el.setAttribute('stroke',m.color);el.setAttribute('stroke-width','2.5');el.setAttribute('stroke-opacity','0.3');
    svg.appendChild(el);
  });

  m.nodes.forEach(n=>{
    const isCx=n.cx,w=isCx?128:136;
    const lp=(n.x/900*100),tp=(n.y/480*100);
    const div=document.createElement('div');
    div.className='node'+(isCx?' central':'');
    div.style.cssText=`left:calc(${lp}% - ${w/2}px);top:calc(${tp}% - ${isCx?64:38}px);width:${w}px;${isCx?`height:${w}px;`:''}background:${isCx?m.color:hexRgba(m.color,0.82)};box-shadow:0 4px 14px ${hexRgba(m.color,0.28)};`;
    div.innerHTML=`<span class="ni">${n.icon}</span><span class="nt">${n.lbl.replace(/\n/g,'<br>')}</span>${n.sub?`<span class="ns">${n.sub}</span>`:''}`;
    div.onclick=()=>{
      document.querySelectorAll(`#a-${m.id} .node`).forEach(e=>e.classList.remove('sel'));
      div.classList.add('sel');
      det.innerHTML=`<span class="det-icon">${n.icon}</span><div class="det-body"><h4>${n.lbl.replace(/\n/g,' ')}</h4><p>${n.det}</p></div>`;
    };
    area.appendChild(div);
  });
});

const compBtn=document.createElement('button');
compBtn.className='tab-btn';
compBtn.style.setProperty('--c','#B7791F');
compBtn.innerHTML=`<span class="ts">📊 Comparativo</span><span class="tt">Tres municipios</span>`;
let chartMade=false;
compBtn.onclick=()=>{
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  compBtn.classList.add('active');
  document.getElementById('s-comp').classList.add('active');
  if(!chartMade){buildRadar();chartMade=true;}
};
tabsEl.appendChild(compBtn);

const compSec=document.createElement('div');
compSec.className='sec';
compSec.id='s-comp';
compSec.innerHTML=`
  <div class="comp-sec">
    <div class="comp-block">
      <div class="comp-hdr">
        <h2>📡 Análisis Comparativo — Capacidades Económicas</h2>
        <p>Evaluación relativa en 6 dimensiones clave · Escala 1–10 basada en análisis cualitativo del PMD y datos sectoriales</p>
      </div>
      <div class="radar-wrap"><canvas id="radarC" width="500" height="360"></canvas></div>
    </div>
    <div class="comp-block">
      <div class="comp-hdr">
        <h2>📋 Perfiles Municipales — Indicadores Comparativos</h2>
        <p>Comparación estructural: economía, retos, instrumentos PMD y fortalezas</p>
      </div>
      <div class="cards-grid" id="cgrid"></div>
    </div>
    <div class="comp-block">
      <div class="comp-hdr">
        <h2>🔁 Convergencias y Divergencias en los PMDs</h2>
        <p>Elementos comunes y diferenciadores en los tres Planes Municipales de Desarrollo 2022–2025</p>
      </div>
      <div class="conv-grid" id="cvgrid"></div>
    </div>
  </div>`;
mainEl.appendChild(compSec);

const cg=document.getElementById('cgrid');
COMP.cards.forEach(c=>{
  const card=document.createElement('div');
  card.className='muni-card';
  card.style.setProperty('--c',c.color);
  card.innerHTML=`
    <div class="mc-head" style="background:${c.color}">
      <span class="mc-ico">${c.icon}</span>
      <div><h3>${c.mun}</h3><div class="mc-tipo">${c.tipo}</div></div>
    </div>
    <div class="mc-body">
      ${c.rows.map(r=>`<div class="mc-row${r.hl?' hl':''}"><div class="mc-lbl">${r.l}</div><div class="mc-val">${r.v}</div></div>`).join('')}
    </div>`;
  cg.appendChild(card);
});

const cvg=document.getElementById('cvgrid');
COMP.conv.forEach(cv=>{
  const d=document.createElement('div');
  d.className='conv-item';
  d.style.setProperty('--lc',cv.color);
  d.innerHTML=`<h4>${cv.title}</h4><p>${cv.text}</p>`;
  cvg.appendChild(d);
});

function buildRadar(){
  const ctx=document.getElementById('radarC').getContext('2d');
  new Chart(ctx,{
    type:'radar',
    data:{
      labels:COMP.radar.labels,
      datasets:COMP.radar.ds.map(d=>({
        label:d.lbl,data:d.data,
        borderColor:d.color,
        backgroundColor:hexRgba(d.color,0.1),
        borderWidth:2.5,
        pointBackgroundColor:d.color,
        pointRadius:4,pointHoverRadius:6
      }))
    },
    options:{
      responsive:false,
      scales:{r:{
        beginAtZero:true,max:10,
        ticks:{stepSize:2,font:{size:10},color:'#718096',backdropColor:'transparent'},
        grid:{color:'rgba(0,0,0,0.07)'},
        pointLabels:{font:{size:10.5,weight:'600'},color:'#4A5568'},
        angleLines:{color:'rgba(0,0,0,0.07)'}
      }},
      plugins:{
        legend:{position:'bottom',labels:{font:{size:12},padding:16,usePointStyle:true}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw}/10`}}
      }
    }
  });
}
</script>
</body>
</html>
