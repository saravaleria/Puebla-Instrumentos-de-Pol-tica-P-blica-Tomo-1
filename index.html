<head>
<meta charset="UTF-8">

<title>Mapas Estratégicos — Puebla y Veracruz</title>
<style>
:root{
  --rojo:#C62828; --rojo-osc:#7B1A1A;
  --crema:#F5F0EB; --crema-card:#FDFAF8;
  --tinta:#4A5568; --borde:#EDE0D4;
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:var(--crema);
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* ---- Barra superior ---- */
.shell-hdr{
  background:linear-gradient(135deg,var(--rojo-osc) 0%,var(--rojo) 100%);
  color:#fff;padding:14px 22px 16px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.14);z-index:5;
}
.shell-hdr .brand{
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px;
}
.shell-hdr h1{font-size:16px;font-weight:700;letter-spacing:.3px;}
.shell-hdr .tag{font-size:11.5px;opacity:.72;}
/* ---- Switch segmentado ---- */
.switch{display:flex;gap:22px;flex-wrap:wrap;}
.group{display:flex;flex-direction:column;gap:5px;}
.group-lbl{
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  opacity:.6;padding-left:2px;
}
.group-pills{display:flex;gap:6px;background:rgba(0,0,0,.16);
  padding:4px;border-radius:12px;}
.pill{
  border:none;cursor:pointer;font-family:inherit;
  background:transparent;color:rgba(255,255,255,.82);
  padding:7px 14px 8px;border-radius:9px;text-align:left;
  transition:background .18s,color .18s,transform .18s;
  display:flex;flex-direction:column;gap:1px;min-width:118px;
}
.pill:hover{background:rgba(255,255,255,.14);}
.pill .p-t{font-size:12.5px;font-weight:700;line-height:1.2;}
.pill .p-s{font-size:9.5px;opacity:.72;line-height:1.25;}
.pill.active{background:#fff;color:var(--rojo);transform:translateY(-1px);
  box-shadow:0 3px 10px rgba(0,0,0,.2);}
.pill.active .p-s{opacity:.7;}
.pill:focus-visible{outline:2px solid #fff;outline-offset:2px;}
/* ---- Zona del mapa ---- */
.stage{flex:1;position:relative;min-height:0;background:var(--crema);}
.frame{position:absolute;inset:0;width:100%;height:100%;border:none;
  background:var(--crema);opacity:0;transition:opacity .25s;}
.frame.ready{opacity:1;}
.loading{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;color:#B0957F;font-size:13px;gap:9px;}
.spin{width:15px;height:15px;border:2px solid var(--borde);
  border-top-color:var(--rojo);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){
  .spin{animation:none;} .frame,.pill{transition:none;}
}
@media (max-width:640px){
  .shell-hdr h1{font-size:14px;}
  .switch{gap:14px;}
  .pill{min-width:0;padding:7px 11px;}
  .pill .p-t{font-size:11.5px;}
}
</style>
</head>

const sw = document.getElementById('switch');
const frame = document.getElementById('frame');
const loading = document.getElementById('loading');

// --- Construir el switch agrupado por estado ---
const groups = {};
MAPS.forEach(m => { (groups[m.estado] ||= []).push(m); });

Object.entries(groups).forEach(([estado, items]) => {
  const g = document.createElement('div');
  g.className = 'group';
  g.innerHTML = `<span class="group-lbl">${estado}</span>`;
  const pills = document.createElement('div');
  pills.className = 'group-pills';
  items.forEach(m => {
    const b = document.createElement('button');
    b.className = 'pill';
    b.dataset.slug = m.slug;
    b.innerHTML = `<span class="p-t">${m.titulo}</span><span class="p-s">${m.sub}</span>`;
    b.onclick = () => { location.hash = m.slug; };
    pills.appendChild(b);
  });
  g.appendChild(pills);
  sw.appendChild(g);
});

// --- Cargar un mapa por slug ---
function b64ToHtml(b64){
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

function load(slug){
  if(!DATA[slug]) slug = MAPS[0].slug;      // fallback
  document.querySelectorAll('.pill').forEach(p =>
    p.classList.toggle('active', p.dataset.slug === slug));
  loading.style.display = 'flex';
  frame.classList.remove('ready');
  frame.onload = () => { frame.classList.add('ready'); loading.style.display='none'; };
  frame.srcdoc = b64ToHtml(DATA[slug]);
}

function current(){
  const h = location.hash.replace(/^#/, '');
  return DATA[h] ? h : MAPS[0].slug;
}

window.addEventListener('hashchange', () => load(current()));
load(current());
</script>
